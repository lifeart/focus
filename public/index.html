<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#f5f5fa" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <title>Focus</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- SEO Meta -->
  <meta name="description" content="Focus — a science-based attention training app with Go/No-Go, N-Back, Flanker, Visual Search exercises, breathing, and Pomodoro timer. Gamified with XP, levels, badges, and adaptive difficulty.">
  <meta name="keywords" content="focus, attention training, cognitive exercises, ADHD, Go/No-Go, N-Back, Flanker, brain training, concentration">
  <meta name="author" content="Focus Training App">

  <!-- Open Graph -->
  <meta property="og:title" content="Focus — Attention Training">
  <meta property="og:description" content="Train your focus with science-based cognitive exercises. Gamified with XP, levels, and adaptive difficulty.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Focus — Attention Training">
  <meta name="twitter:description" content="Train your focus with science-based cognitive exercises.">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Focus">

  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/exercises.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/bundle.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        // Check for updates every 60 seconds
        setInterval(function() { reg.update(); }, 60000);
        // When a new SW is waiting, auto-activate it and reload
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                window.location.reload();
              }
            });
          }
        });
      }).catch(function() {});
    }
  </script>
</body>
</html>
